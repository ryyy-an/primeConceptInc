[phases.setup]
nixPkgs = ["php82", "nodejs_20", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.openssl"]

[phases.install]
cmds = ["cd PisOfficial && npm install"]

[phases.build]
cmds = ["cd PisOfficial && npm run build"]

[start]
cmd = "cd PisOfficial && php -S 0.0.0.0:${PORT:-8000} router.php"
